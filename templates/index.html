<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Музей современной Геологии</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark:    #0d0f14;
      --panel:   #131720;
      --card:    #1a1f2e;
      --border:  #2a3050;
      --accent:  #8b6dd6;
      --accent2: #c9a84c;
      --text:    #e8e4f0;
      --muted:   #7a7d9a;
      --radius:  14px;
    }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ─── Header ─── */
    header {
      text-align: center;
      padding: 3rem 1rem 2rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #0a0c12 0%, var(--dark) 100%);
    }
    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 600;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, #c9a84c 0%, #e8d8a0 50%, #8b6dd6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      margin-top: .6rem;
      color: var(--muted);
      font-size: .95rem;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    /* ─── Search ─── */
    .search-wrap {
      max-width: 440px;
      margin: 2rem auto 0;
      padding: 0 1rem;
    }
    .search-wrap input {
      width: 100%;
      padding: .75rem 1.2rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 50px;
      color: var(--text);
      font-size: .95rem;
      outline: none;
      transition: border-color .2s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--muted); }

    /* ─── Grid ─── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1.1rem;
      max-width: 1200px;
      margin: 2.5rem auto;
      padding: 0 1.5rem;
    }

    /* ─── Card ─── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform .25s, box-shadow .25s, border-color .25s;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 8px 30px rgba(139,109,214,.25);
    }
    .card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }
    .card .label {
      padding: .7rem .85rem;
      font-size: .82rem;
      font-weight: 500;
      letter-spacing: .02em;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card .num {
      font-size: .7rem;
      color: var(--muted);
      padding: 0 .85rem .65rem;
    }

    /* ─── Modal overlay ─── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(5,6,10,.82);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      opacity: 0; pointer-events: none;
      transition: opacity .3s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    /* ─── Modal box ─── */
    .modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      max-width: 780px;
      width: calc(100% - 2rem);
      max-height: 90vh;
      overflow-y: auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
      transform: scale(.94);
      transition: transform .3s;
    }
    .overlay.open .modal { transform: scale(1); }

    @media (max-width: 560px) {
      .modal { grid-template-columns: 1fr; }
    }

    .modal-img {
      border-radius: 20px 0 0 20px;
      overflow: hidden;
    }
    .modal-img img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      min-height: 260px;
    }

    @media (max-width: 560px) {
      .modal-img { border-radius: 20px 20px 0 0; }
      .modal-img img { min-height: 220px; }
    }

    .modal-body {
      padding: 2rem 1.8rem;
      display: flex; flex-direction: column; gap: 1rem;
    }
    .modal-body .mineral-num {
      font-size: .75rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent2);
    }
    .modal-body h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 600;
      line-height: 1.15;
    }
    .props {
      display: flex; flex-direction: column; gap: .5rem;
    }
    .prop {
      display: flex; gap: .6rem; align-items: baseline;
      font-size: .88rem;
    }
    .prop .key {
      color: var(--muted);
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      min-width: 80px;
    }
    .prop .val { color: var(--text); }

    .hardness-bar {
      margin-top: .3rem;
    }
    .hardness-bar .bar-wrap {
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      margin-top: .4rem;
      overflow: hidden;
    }
    .hardness-bar .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 100%);
      border-radius: 3px;
      transition: width .6s ease;
    }

    .fact-box {
      background: rgba(139,109,214,.08);
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      padding: .85rem 1rem;
      font-size: .88rem;
      font-style: italic;
      color: #c5bfdf;
      line-height: 1.55;
    }

    /* close button */
    .close-btn {
      position: absolute;
      top: 1rem; right: 1rem;
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, color .2s;
      z-index: 1;
    }
    .close-btn:hover { background: var(--accent); color: #fff; }

    /* hidden */
    .card.hidden { display: none; }

    /* footer */
    footer {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: .8rem;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<header>
  <h1>Музей современной Геологии</h1>
  <p>Коллекция из 30 минералов</p>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Поиск минерала..." autocomplete="off">
  </div>
</header>

<div class="grid" id="grid">
  {% for m in minerals %}
  <div class="card" data-id="{{ m.id }}" data-name="{{ m.name|lower }}">
    <img src="/static/minerals/mineral_{{ m.id }}.png" alt="{{ m.name }}" loading="lazy">
    <div class="label">{{ m.name }}</div>
    <div class="num">№ {{ m.id }}</div>
  </div>
  {% endfor %}
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <button class="close-btn" id="closeBtn">✕</button>
    <div class="modal-img">
      <img id="mImg" src="" alt="">
    </div>
    <div class="modal-body">
      <div class="mineral-num" id="mNum"></div>
      <h2 id="mName"></h2>
      <div class="props">
        <div class="prop"><span class="key">Цвет</span><span class="val" id="mColor"></span></div>
        <div class="prop"><span class="key">Форма</span><span class="val" id="mShape"></span></div>
      </div>
      <div class="hardness-bar">
        <div class="prop">
          <span class="key">Твёрдость</span>
          <span class="val" id="mHardness"></span>
          <span style="color:var(--muted);font-size:.78rem"> / 10</span>
        </div>
        <div class="bar-wrap">
          <div class="bar-fill" id="mBar" style="width:0%"></div>
        </div>
      </div>
      <div class="fact-box" id="mFact"></div>
    </div>
  </div>
</div>

<footer>Музей современной Геологии &nbsp;·&nbsp; 2026</footer>

<script>
  const overlay  = document.getElementById('overlay');
  const closeBtn = document.getElementById('closeBtn');

  function openModal(id) {
    fetch(`/api/mineral/${id}`)
      .then(r => r.json())
      .then(m => {
        document.getElementById('mImg').src = `/static/minerals/mineral_${m.id}.png`;
        document.getElementById('mImg').alt = m.name;
        document.getElementById('mNum').textContent = `Минерал № ${m.id}`;
        document.getElementById('mName').textContent = m.name;
        document.getElementById('mColor').textContent = m.color;
        document.getElementById('mShape').textContent = m.shape;
        document.getElementById('mHardness').textContent = m.hardness;
        document.getElementById('mFact').textContent = m.fact;
        // animate bar after short delay
        const pct = (m.hardness / 10) * 100;
        document.getElementById('mBar').style.width = '0%';
        setTimeout(() => { document.getElementById('mBar').style.width = pct + '%'; }, 80);
        overlay.classList.add('open');
      });
  }

  function closeModal() { overlay.classList.remove('open'); }

  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => openModal(card.dataset.id));
  });
  closeBtn.addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // Search
  document.getElementById('search').addEventListener('input', function() {
    const q = this.value.toLowerCase().trim();
    document.querySelectorAll('.card').forEach(card => {
      card.classList.toggle('hidden', q && !card.dataset.name.includes(q));
    });
  });
</script>
</body>
</html>
